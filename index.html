<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>WhatsintheMirror.org – Website Audit Deck</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Typography & basic theme -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      background: #0b0b10;
      color: #f9fafb;
    }

    .remark-slide-content {
      font-size: 26px;
      padding: 3rem 4rem;
      background: radial-gradient(circle at top left, #1f2937, #020617);
      color: #f9fafb;
    }

    .remark-slide-content h1,
    .remark-slide-content h2,
    .remark-slide-content h3 {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .remark-slide-content h1 { font-size: 2.6rem; margin-bottom: 0.75rem; }
    .remark-slide-content h2 { font-size: 2.0rem; margin-bottom: 0.5rem; }
    .remark-slide-content h3 { font-size: 1.5rem; margin-bottom: 0.5rem; }

    .remark-slide-content ul,
    .remark-slide-content ol {
      margin-top: 0.75rem;
      line-height: 1.5;
    }

    .remark-slide-content blockquote {
      border-left: 4px solid #6366f1;
      padding-left: 1rem;
      margin-left: 0;
      color: #e5e7eb;
      font-style: italic;
    }

    .remark-slide-number {
      font-size: 14px;
      color: #9ca3af;
    }

    /* Title slide */
    .title-slide {
      text-align: left;
      background: radial-gradient(circle at top left, #4f46e5, #020617);
    }

    .title-slide h1 {
      font-size: 3rem;
    }

    .title-slide h2 {
      font-size: 1.6rem;
      margin-top: 0.25rem;
    }

    .title-slide p {
      margin-top: 1.5rem;
      font-size: 1.1rem;
      color: #e5e7eb;
    }

    /* Two-column helper if you want it later */
    .cols {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(0, 1fr);
      gap: 2.5rem;
      align-items: flex-start;
    }
  </style>
</head>
<body>
  <textarea id="source" style="display:none;"></textarea>

  <script src="https://remarkjs.com/downloads/remark-latest.min.js"></script>
  <script>
    // Load the markdown deck file from the same repo
    fetch('witm-replit-deck.md')
      .then(response => response.text())
      .then(text => {
        document.getElementById('source').value = text;

        window.slideshow = remark.create({
          ratio: '16:9',
          highlightLanguage: 'javascript',
          highlightLines: true,
          slideNumberFormat: '%current% / %total%'
        });
      });
  </script>
</body>
</html>
